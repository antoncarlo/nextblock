# NextBlock protocol subgraph manifest (Goldsky / The Graph compatible).
#
# Full protocol event indexing: vault lifecycle (factory template — every
# vault ever created is picked up automatically), portfolios, policies,
# claims, compliance, premium flows, NAV/risk oracle, bordereau assertions,
# allocation proposals, adapters, and the LP redemption queue.
#
# Deploy (owner-gated — needs a Goldsky or Graph Studio account):
#   cd indexer
#   npm install
#   npm run codegen && npm run build
#   goldsky subgraph deploy nextblock-protocol/v1 --path .
#     (or: graph deploy --studio nextblock-protocol)
#
# Base Sepolia (chain id 84532). Core startBlock 42670443 = just before the
# staging-stack deploy (record timestamp 1781110174 → block 42670943, found
# by RPC binary search). RedemptionQueue keeps its own later startBlock.
# NOTE: LendingMarket deploys per-venue and has no live address yet — add its
# dataSource (ABI already in abis/) when the first venue is deployed.
specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RedemptionQueue
    network: base-sepolia
    source:
      address: "0x243205af6C2a89C33c67f967901415C06F2a9cc0"
      abi: RedemptionQueue
      startBlock: 43528000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Epoch
        - RedemptionRequest
        - RedemptionClaim
        - LpPosition
        - ProtocolStat
      abis:
        - name: RedemptionQueue
          file: ./abis/RedemptionQueue.json
      eventHandlers:
        - event: RedemptionRequested(indexed uint256,indexed address,uint256)
          handler: handleRedemptionRequested
        - event: EpochSettled(indexed uint256,uint256,uint256,uint256)
          handler: handleEpochSettled
        - event: RedemptionClaimed(indexed uint256,indexed address,uint256,uint256)
          handler: handleRedemptionClaimed
        - event: PausedSet(bool)
          handler: handlePausedSet
      file: ./src/redemption-queue.ts

