# Protocol keepers — scheduled cron (redemption settlement + claims finalization).
#
# Job `settle`: RedemptionKeeper.settleIfDue against the live RedemptionQueue —
# settles the current epoch only when matured + non-empty, no-ops otherwise.
# Job `claims`: ClaimsKeeper.sweep — pays committee-APPROVED unfrozen claims
# (executeClaim) and finalizes liveness-elapsed bordereau assertions
# (finalizeAssertion). Both entrypoints are permissionless: authority was
# exercised on-chain (committee / liveness); the keeper only supplies gas.
#
# OWNER-GATED activation (one-time): set these repo secrets/variables —
#   secret  KEEPER_PRIVATE_KEY        settle: must hold ALLOCATOR_ROLE; claims: any funded key
#   secret  BASE_SEPOLIA_RPC_URL      Base Sepolia RPC endpoint
#   var     REDEMPTION_QUEUE_ADDRESS  0x243205af6C2a89C33c67f967901415C06F2a9cc0 (live queue)
#   (claims addresses default to the staging deployment record; override with
#    vars CLAIM_MANAGER_ADDRESS / BORDEREAU_ORACLE_ADDRESS after a redeploy)
#
# The keeper key should be a DEDICATED key (granted via the Safe/timelock),
# not the deployer EOA.

name: redemption-keeper

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours; keeper no-ops until an epoch matures
  workflow_dispatch: {} # manual trigger for on-demand settlement

permissions:
  contents: read

concurrency:
  group: redemption-keeper
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # forge-std + openzeppelin needed to compile the keeper script

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Settle matured epoch (no-op if nothing due)
        env:
          PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          REDEMPTION_QUEUE_ADDRESS: ${{ vars.REDEMPTION_QUEUE_ADDRESS }}
        run: |
          forge script script/RedemptionKeeper.s.sol:RedemptionKeeper \
            --rpc-url base_sepolia --broadcast --skip-simulation

  claims:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Pay approved claims + finalize elapsed assertions (no-op if none due)
        env:
          PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          # Staging deployment record defaults; vars override after a redeploy.
          CLAIM_MANAGER_ADDRESS: ${{ vars.CLAIM_MANAGER_ADDRESS || '0x504d99e92FCD13040AbAf1Ba9165871DDE3Ddd48' }}
          BORDEREAU_ORACLE_ADDRESS: ${{ vars.BORDEREAU_ORACLE_ADDRESS || '0xaB074a28b474312E75b89A6822537f31f8fA7Ed0' }}
        run: |
          forge script script/ClaimsKeeper.s.sol:ClaimsKeeper \
            --rpc-url base_sepolia --broadcast --skip-simulation
