# NextBlock minimal CI: repeatable quality gates for frontend and contracts.
# No secrets required. No deploy. Base-only protocol scope (Base Sepolia 84532 staging).
name: CI

on:
  push:
  pull_request:

jobs:
  addressbook:
    name: addressbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Address book anti-drift check
        run: node scripts/check-addressbook.mjs

      - name: NatSpec coverage gate (contracts public surface)
        run: node scripts/check-natspec.mjs

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Root ci:frontend:* scripts use npm --prefix app, which anchors npm to
      # app/ and its lockfile instead of resolving the workspace root (which
      # has no root lockfile). Mirrors the verified local invocation.
      - name: Install dependencies (lockfile)
        run: npm run ci:frontend:install

      - name: Lint
        run: npm run ci:frontend:lint

      - name: Typecheck
        run: npm run ci:frontend:typecheck

      - name: Build
        run: npm run ci:frontend:build

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails on high/critical advisories anywhere in the dependency graph.
      # Moderate advisories (wallet-stack transitive churn) are tracked in
      # docs/PRODUCTION_READINESS_AUDIT.md but do not block the build.
      # Lockfile lives at the workspace root so overrides take effect.
      - name: Dependency audit (high and above)
        run: npm audit --audit-level=high

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Format check
        run: forge fmt --check

      - name: Build with sizes
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      # Gas ratchet: .gas-snapshot is committed; fuzz/invariant seeds are
      # pinned in foundry.toml so runs are reproducible. 1% tolerance absorbs
      # metering noise (e.g. the deploy-script test) without hiding real
      # regressions. Regenerate with `forge snapshot` when gas changes are
      # intentional and commit the diff.
      - name: Gas snapshot check
        run: forge snapshot --check --tolerance 1

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Coverage (lcov)
        working-directory: contracts
        run: forge coverage --report lcov --no-match-coverage "(test|script)"

      # Ratchet floor — raise when coverage improves, never lower.
      # Measured 2026-07-06: 97.45% lines on contracts/src (1718/1763).
      # 95 leaves room for a new module landing at good-but-not-total
      # coverage without ever letting the suite decay.
      - name: Line-coverage floor (contracts/src)
        run: node scripts/check-coverage.mjs contracts/lcov.info 95

  slither:
    name: slither
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Static analysis gate: fails on high-severity findings only; medium and
      # below are review material, tracked in the audit-prep docs, not build
      # blockers. Scope is contracts/src (lib/test/script filtered in
      # contracts/slither.config.json).
      - name: Slither (fail on high)
        uses: crytic/slither-action@v0.4.1
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high
