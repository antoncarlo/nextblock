# NextBlock minimal CI: repeatable quality gates for frontend and contracts.
# No secrets required. No deploy. Base-only protocol scope (Base Sepolia 84532 staging).
name: CI

on:
  push:
  pull_request:

jobs:
  addressbook:
    name: addressbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Address book anti-drift check
        run: node scripts/check-addressbook.mjs

      - name: NatSpec coverage gate (contracts public surface)
        run: node scripts/check-natspec.mjs

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Root ci:frontend:* scripts use npm --prefix app, which anchors npm to
      # app/ and its lockfile instead of resolving the workspace root (which
      # has no root lockfile). Mirrors the verified local invocation.
      - name: Install dependencies (lockfile)
        run: npm run ci:frontend:install

      - name: Lint
        run: npm run ci:frontend:lint

      - name: Typecheck
        run: npm run ci:frontend:typecheck

      - name: Build
        run: npm run ci:frontend:build

  # Read-only E2E against the production build: the vault table reads REAL
  # Base Sepolia state through the public RPC (no wallet, no secrets), so a
  # green run proves the investor read path end-to-end. Wallet-signing flows
  # stay with the contract suite + pilot manual checklist.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (lockfile)
        run: npm run ci:frontend:install

      - name: Install Playwright chromium
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run ci:frontend:build

      - name: E2E (production build + live Base Sepolia reads)
        run: npm run ci:frontend:e2e

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails on high/critical advisories anywhere in the dependency graph.
      # Moderate advisories (wallet-stack transitive churn) are tracked in
      # docs/PRODUCTION_READINESS_AUDIT.md but do not block the build.
      # Lockfile lives at the workspace root so overrides take effect.
      - name: Dependency audit (high and above)
        run: npm audit --audit-level=high

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Format check
        run: forge fmt --check

      - name: Build with sizes
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      # Gas ratchet on CONCRETE unit tests only: fuzz medians drift across
      # forge versions (the fuzzer RNG is not stable between releases, even
      # with a pinned seed), invariant campaigns are multi-threaded (revert
      # counts vary per machine) and fork tests skip without RPC — none of
      # them is gas-tracking material. 1% tolerance absorbs metering noise.
      # Regenerate when gas changes are intentional and commit the diff:
      #   forge snapshot --no-match-contract "(Invariant|Fork)" --no-match-test "testFuzz"
      - name: Gas snapshot check
        run: forge snapshot --check --tolerance 1 --no-match-contract "(Invariant|Fork)" --no-match-test "testFuzz"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Coverage (lcov)
        working-directory: contracts
        run: forge coverage --report lcov --no-match-coverage "(test|script)"

      # Ratchet floor — raise when coverage improves, never lower.
      # Measured 2026-07-08: 98.75% lines on contracts/src (1741/1763) after
      # BranchCoverage.t.sol closed the reachable revert/edge branches. The
      # remaining ~22 lines are deep defensive branches (256-entry queue caps,
      # expiry-pruning swaps) whose tests would be pathological loops — see
      # the audit-prep invariants catalogue for why they are safe.
      - name: Line-coverage floor (contracts/src)
        run: node scripts/check-coverage.mjs contracts/lcov.info 98

  slither:
    name: slither
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Static analysis gate: fails on MEDIUM severity and above (raised from
      # high after a clean first run). Low/informational stay review material,
      # tracked in the audit-prep docs. Scope is contracts/src (lib/test/script
      # filtered in contracts/slither.config.json). The incorrect-equality
      # detector is config-excluded: all 16 hits were enum-status or
      # zero-sentinel comparisons (the dangerous variant — strict equality on
      # balances — does not occur in the codebase); the remaining findings are
      # triaged inline with slither-disable comments and justifications.
      - name: Slither (fail on medium and above)
        uses: crytic/slither-action@v0.4.1
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: medium
