[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

fs_permissions = [{ access = "read-write", path = "deployments" }]

# Base-only MVP: Base Sepolia (staging) and local Anvil. No mainnet target.
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }

[profile.default.fuzz]
runs = 256

[profile.ci.fuzz]
runs = 1000
