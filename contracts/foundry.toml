[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

fs_permissions = [{ access = "read-write", path = "deployments" }]

# Base-only MVP: Base Sepolia (staging) and local Anvil. No mainnet target.
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }

[profile.default.fuzz]
runs = 256
# Pinned seed: fuzz/invariant runs are deterministic so a latent counterexample
# (e.g. the RedemptionQueue dust underflow) can't pass by seed luck on one run
# and fail on the next. Reproducible locally and in CI.
seed = "0x4e455854424c4f434b"

[profile.ci.fuzz]
runs = 1000
seed = "0x4e455854424c4f434b"

[profile.ci.invariant]
runs = 256
depth = 100
fail_on_revert = false
